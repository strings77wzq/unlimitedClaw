replicaCount: 2

image:
  repository: unlimitedclaw
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 18790

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: unlimitedclaw.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: 18790
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: 18790
  initialDelaySeconds: 3
  periodSeconds: 10

config:
  port: 18790
  log_level: "info"
  openai:
    model: "gpt-4"
    temperature: 0.7
    max_tokens: 2000
  server:
    read_timeout: 30
    write_timeout: 30
    idle_timeout: 120

secrets:
  openai_api_key: "changeme"

nodeSelector: {}

tolerations: []

affinity: {}
