apiVersion: v1
kind: Service
metadata:
  name: {{ include "golem.fullname" . }}-gateway
  labels:
    {{- include "golem.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "golem.selectorLabels" . | nindent 4 }}
    component: gateway
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
