services:
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["agent", "-m", "${AGENT_MESSAGE:-Hello}"]
    environment:
      - UNLIMITEDCLAW_PROVIDER=${UNLIMITEDCLAW_PROVIDER:-openai}
      - UNLIMITEDCLAW_MODEL=${UNLIMITEDCLAW_MODEL:-gpt-4o}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - data:/app/data
      - ./config:/app/config:ro
    profiles:
      - agent

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["gateway"]
    ports:
      - "18790:18790"
    environment:
      - UNLIMITEDCLAW_PROVIDER=${UNLIMITEDCLAW_PROVIDER:-openai}
      - UNLIMITEDCLAW_MODEL=${UNLIMITEDCLAW_MODEL:-gpt-4o}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - data:/app/data
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18790/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    profiles:
      - gateway

volumes:
  data:
