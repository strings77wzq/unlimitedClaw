apiVersion: apps/v1
kind: Deployment
metadata:
  name: golem-gateway
  namespace: golem
  labels:
    app: golem
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: golem
      component: gateway
  template:
    metadata:
      labels:
        app: golem
        component: gateway
    spec:
      containers:
        - name: gateway
          image: golem:latest
          ports:
            - containerPort: 18790
              protocol: TCP
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: golem-secrets
                  key: openai-api-key
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 18790
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 18790
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: golem-config
