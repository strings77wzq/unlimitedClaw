apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unlimitedclaw-gateway
  namespace: unlimitedclaw
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: unlimitedclaw.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unlimitedclaw-gateway
                port:
                  number: 80
