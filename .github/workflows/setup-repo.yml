name: Setup Repository

on:
  workflow_dispatch:

jobs:
  setup-topics:
    runs-on: ubuntu-latest
    permissions:
      metadata: read
    steps:
      - name: Set repository topics
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: [
                'go', 'golang', 'ai-agent', 'cli', 'cloud-native',
                'llm', 'rag', 'openai', 'anthropic', 'kubernetes',
                'docker', 'cobra', 'mcp', 'react-agent', 'ai-assistant'
              ]
            });
            console.log('Topics set successfully');
